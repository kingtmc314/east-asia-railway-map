name: Update Railway Data

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      region:
        description: 'Region to update (blank = all)'
        required: false
        type: choice
        options:
          - all
          - hongkong
          - macau
          - taiwan
          - china
          - japan
      bootstrap_only:
        description: 'Bootstrap from existing topo (skip Overpass)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and clean transit data
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.bootstrap_only }}" = "true" ]; then
            ARGS="--bootstrap"
          fi
          REGION="${{ github.event.inputs.region }}"
          if [ -n "$REGION" ] && [ "$REGION" != "all" ]; then
            ARGS="$ARGS --region=$REGION"
          fi
          node scripts/fetch-and-clean-transit.js $ARGS

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/*_clean.json public/data/clean public/data/clean-manifest.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "$(cat <<'EOF'
chore(data): refresh cleaned transit GeoJSON from OSM pipeline.

Automated weekly update via fetch-and-clean-transit.js
EOF
)"
          git push
